<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ollama Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital@0;1&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <div class="shell">

    <aside class="sidebar">
      <div class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">Ollama</span>
      </div>
        <div class="memory-controls">
          <label style="display:flex;align-items:center;gap:8px;margin-top:12px;">
            <input type="checkbox" id="useMemory" />
            <span>Use server memory</span>
          </label>
          <button id="loadServerBtn" class="clear-btn" style="margin-top:8px;">Load server memory</button>
          <button id="clearServerBtn" class="clear-btn" style="margin-top:6px;">Clear server memory</button>
        </div>
        <div class="knowledge-controls" style="margin-top:18px;">
          <label style="display:flex;align-items:center;gap:8px;">
            <input type="checkbox" id="useKnowledge" />
            <span>Use knowledge base</span>
          </label>
          <textarea id="kbText" placeholder="Paste custom data here to add to KB" rows="4" style="width:100%;margin-top:8px;padding:10px;border-radius:10px;border:1px solid #333;background:#101218;color:#fff;font-family:inherit;"></textarea>
          <input type="file" id="kbFile" style="width:100%;margin-top:8px;color:#fff;" />
          <button id="uploadKbBtn" class="clear-btn" style="margin-top:8px;">Upload file to knowledge base</button>
          <button id="addKbBtn" class="clear-btn" style="margin-top:8px;">Add to knowledge base</button>
          <button id="clearKbBtn" class="clear-btn" style="margin-top:6px;">Clear knowledge base</button>
        </div>
      <div class="model-badge">
        <span class="model-dot"></span>
        <span id="modelName">tinyllama</span>
      </div>
      <div class="sidebar-footer">
        <button class="clear-btn" id="clearBtn" title="Clear conversation">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          Clear chat
        </button>
      </div>
    </aside>

    <main class="chat-area">
      <div class="messages" id="conversation">
        <div class="welcome">
          <div class="welcome-icon">◈</div>
          <h2>Local AI, zero cloud.</h2>
          <p>Powered by Ollama running on your machine.</p>
        </div>
      </div>

      <div class="input-bar">
        <div class="input-wrap">
          <textarea
            id="message"
            placeholder="Ask anything…"
            rows="1"
            autocomplete="off"
            spellcheck="true"
          ></textarea>
          <button id="sendBtn" type="button" aria-label="Send">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
        <p class="hint">Running locally · no data leaves your device</p>
      </div>
    </main>

  </div>

  <script>
    const conv      = document.getElementById('conversation');
    const textarea  = document.getElementById('message');
    const sendBtn   = document.getElementById('sendBtn');
    const clearBtn  = document.getElementById('clearBtn');
    const useMemory = document.getElementById('useMemory');
    const loadServerBtn = document.getElementById('loadServerBtn');
    const clearServerBtn = document.getElementById('clearServerBtn');
    const useKnowledge = document.getElementById('useKnowledge');
    const kbText = document.getElementById('kbText');
    const kbFile = document.getElementById('kbFile');
    const uploadKbBtn = document.getElementById('uploadKbBtn');
    const addKbBtn = document.getElementById('addKbBtn');
    const clearKbBtn = document.getElementById('clearKbBtn');
    const modelName = document.getElementById('modelName');

    // Auto-grow textarea
    textarea.addEventListener('input', () => {
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 180) + 'px';
    });

    // Send on Enter (Shift+Enter = newline)
    textarea.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    sendBtn.addEventListener('click', send);
    clearBtn.addEventListener('click', () => {
      localStorage.removeItem('chat_history');
      conv.innerHTML = '';
      appendWelcome();
    });

    // Default to continuous chat (use server memory)
    useMemory.checked = true;

    uploadKbBtn.addEventListener('click', async () => {
      const file = kbFile.files[0];
      if (!file) {
        alert('Select a file to upload to the knowledge base.');
        return;
      }
      const form = new FormData();
      form.append('file', file);
      try {
        const res = await fetch('/kb/upload', {
          method: 'POST',
          body: form,
        });
        const data = await res.json();
        if (!res.ok || data.error) {
          alert('Upload failed: ' + (data.error || 'Server error'));
          return;
        }
        kbFile.value = '';
        alert('File uploaded to the knowledge base.');
      } catch (e) {
        console.warn(e);
        alert('Failed to upload file.');
      }
    });

    addKbBtn.addEventListener('click', async () => {
      const content = kbText.value.trim();
      if (!content) {
        alert('Enter text to add to the knowledge base.');
        return;
      }
      try {
        const res = await fetch('/kb/add', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: content }),
        });
        const data = await res.json();
        if (!res.ok || data.error) {
          alert('Failed to add document: ' + (data.error || 'Server error'));
          return;
        }
        kbText.value = '';
        alert('Document added to the knowledge base.');
      } catch (e) {
        console.warn(e);
        alert('Failed to add document to knowledge base.');
      }
    });

    clearKbBtn.addEventListener('click', async () => {
      try {
        await fetch('/kb/clear', { method: 'POST' });
        alert('Knowledge base cleared');
      } catch (e) {
        console.warn(e);
        alert('Failed to clear knowledge base');
      }
    });

    loadServerBtn.addEventListener('click', async () => {
      try {
        const r = await fetch('/memory');
        const j = await r.json();
        if (j.memory && j.memory.length) {
          conv.innerHTML = '';
          j.memory.forEach(it => appendMsg(it.role, it.text));
        } else {
          alert('No server memory stored');
        }
      } catch (e) { console.warn(e); alert('Failed to load server memory'); }
    });

    clearServerBtn.addEventListener('click', async () => {
      try {
        await fetch('/memory/clear', { method: 'POST' });
        alert('Server memory cleared');
      } catch (e) { console.warn(e); alert('Failed to clear server memory'); }
    });

    function appendWelcome() {
      conv.innerHTML = `
        <div class="welcome">
          <div class="welcome-icon">◈</div>
          <h2>Local AI, zero cloud.</h2>
          <p>Powered by Ollama running on your machine.</p>
        </div>`;
    }

    function removeWelcome() {
      const w = conv.querySelector('.welcome');
      if (w) w.remove();
    }

    function appendMsg(role, text, isThinking = false) {
      const wrap = document.createElement('div');
      wrap.className = `msg ${role}${isThinking ? ' thinking' : ''}`;

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = role === 'user' ? 'U' : '◈';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      if (isThinking) {
        bubble.innerHTML = `<span class="dot"></span><span class="dot"></span><span class="dot"></span>`;
      } else {
        bubble.textContent = text;
      }

      if (role === 'user') {
        wrap.appendChild(bubble);
        wrap.appendChild(avatar);
      } else {
        wrap.appendChild(avatar);
        wrap.appendChild(bubble);
      }

      conv.appendChild(wrap);
      conv.scrollTop = conv.scrollHeight;
      if (!isThinking) saveHistory();
      return wrap;
    }

    function setLoading(on) {
      sendBtn.disabled = on;
      textarea.disabled = on;
      sendBtn.classList.toggle('loading', on);
    }

    async function send() {
      const text = textarea.value.trim();
      if (!text) return;

      removeWelcome();
      appendMsg('user', text);
      textarea.value = '';
      textarea.style.height = 'auto';

      const thinkEl = appendMsg('bot', '', true);
      setLoading(true);

      try {
          const res  = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text, useMemory: useMemory.checked, useKnowledge: useKnowledge.checked }),
          });
        const data = await res.json();
        thinkEl.remove();

        if (!res.ok || data.error) {
          appendMsg('bot', '⚠ ' + (data.details || data.error || 'Server error'));
        } else {
          appendMsg('bot', data.reply || '(empty response)');
          // Save to server memory via a lightweight call (append locally to also keep server copy)
          try {
            // POSTing to /memory isn’t implemented; server saves automatically when useMemory=true
          } catch (e) { /* ignore */ }
        }
      } catch (err) {
        thinkEl.remove();
        appendMsg('bot', '⚠ Network error: ' + err.message);
      } finally {
        setLoading(false);
        textarea.focus();
      }
    }

    // Fetch model name from Ollama
    fetch('http://127.0.0.1:11434/api/tags')
      .then(r => r.json())
      .then(d => {
        if (d.models && d.models.length > 0) {
          modelName.textContent = d.models[0].name.split(':')[0];
        }
      })
      .catch(() => {});
  
    // --- History Persistence ---
    function saveHistory() {
      try {
        const items = [];
        conv.querySelectorAll('.msg').forEach(node => {
          if (node.classList.contains('thinking')) return;
          const role = node.classList.contains('user') ? 'user' : 'bot';
          const bubble = node.querySelector('.bubble');
          const text = bubble ? bubble.textContent : '';
          if (text && !text.startsWith('⚠')) items.push({ role, text });
        });
        localStorage.setItem('chat_history', JSON.stringify(items));
      } catch (e) {
        console.warn('Could not save history', e);
      }
    }

    function loadHistory() {
      try {
        const raw = localStorage.getItem('chat_history');
        if (!raw) return;
        const items = JSON.parse(raw);
        if (!Array.isArray(items) || items.length === 0) return;
        conv.innerHTML = '';
        items.forEach(it => appendMsg(it.role, it.text));
      } catch (e) {
        console.warn('Could not load history', e);
      }
    }

    // Wire clear button to also clear storage
    clearBtn.addEventListener('click', () => {
      localStorage.removeItem('chat_history');
      conv.innerHTML = '';
      appendWelcome();
    });

    // Load saved history on start
    window.addEventListener('DOMContentLoaded', () => {
      loadHistory();
      if (!conv.querySelector('.msg')) appendWelcome();
    });
  </script>
</body>
</html>
